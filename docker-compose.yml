# docker-compose del Sistema automatizado de búsqueda de convocatorias.
#
# Puertos ocupados en esta máquina (stack n8n): 80, 5050, 5432, 6333, 6334,
# 6379, 8080, 11434 -> NO usarlos en el host. Los puertos publicados son
# configurables por env (DB_PORT, API_PORT, FRONTEND_PORT).
name: convocatorias

services:
  # --- Base de datos -------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- API (FastAPI + uvicorn) --------------------------------------------
  # entrypoint.sh: espera BD -> alembic upgrade head -> seed fuentes -> uvicorn
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-8100}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # --- Worker (APScheduler) -----------------------------------------------
  # Misma imagen que api, distinto command. Depende de api healthy para que
  # las migraciones ya estén aplicadas antes de arrancar el scheduler.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker.scheduler
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # --- Frontend (nginx sirve estáticos + proxy /api) ----------------------
  frontend:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
