# Config de nginx para el frontend. Sirve estáticos y hace proxy de /api al
# servicio `api` (mismo origen -> sin CORS). El agente F (Fase 1) construye el
# resto del frontend contra docs/api-contract.md.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de la API. `/api/v1/...` -> http://api:8000/api/v1/...
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA con hash-router: cualquier ruta desconocida cae a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
